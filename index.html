<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clima Argentina — Bandas de Temperatura</title>
  <script src="https://cdn.jsdelivr.net/npm/plotly.js-dist@2.27.0/plotly.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f8fa; --surface: #ffffff; --border: #e2e6ea;
      --text: #1a1f2e; --muted: #6b7280; --accent: #2E5F8A;
      --accent-lt: #EBF2F9; --radius: 8px;
      --alert: #FEF3CD; --alert-border: #F59E0B; --alert-text: #92400E;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header { background: var(--accent); padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 17px; font-weight: 600; color: #fff; }
    header span { font-size: 13px; color: rgba(255,255,255,0.65); margin-left: 4px; }
    .header-meta { font-size: 11px; color: rgba(255,255,255,0.55); }

    .app { max-width: 1200px; margin: 0 auto; padding: 24px 24px 48px; display: grid; grid-template-columns: 220px 1fr; gap: 20px; align-items: start; }

    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; position: sticky; top: 20px; }
    .panel-section { margin-bottom: 22px; }
    .panel-section:last-child { margin-bottom: 0; }
    .panel-label { font-size: 10px; font-weight: 600; letter-spacing: .07em; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }

    .city-list { display: flex; flex-direction: column; gap: 6px; }
    .city-item { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 5px 8px; border-radius: 6px; font-size: 13px; transition: background .12s; }
    .city-item:hover { background: var(--accent-lt); }
    .city-item input[type=checkbox] { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; }
    .city-item.active { background: var(--accent-lt); font-weight: 500; }

    .date-group { display: flex; flex-direction: column; gap: 8px; }
    .date-row { display: flex; flex-direction: column; gap: 3px; }
    .date-row label { font-size: 11px; color: var(--muted); }
    .date-row input[type=date] { font-size: 12px; padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px; color: var(--text); background: var(--surface); width: 100%; cursor: pointer; }
    .date-row input[type=date]:focus { outline: 2px solid var(--accent); outline-offset: 1px; }

    /* Accesos rápidos de período */
    .quick-dates { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
    .quick-btn { font-size: 11px; padding: 4px 8px; border: 1px solid var(--border); border-radius: 5px; background: var(--bg); color: var(--muted); cursor: pointer; transition: all .12s; }
    .quick-btn:hover { background: var(--accent-lt); border-color: var(--accent); color: var(--accent); }

    .ref-group { display: flex; flex-direction: column; gap: 6px; }
    .ref-item { display: flex; align-items: center; gap: 8px; font-size: 12px; padding: 5px 8px; border-radius: 6px; cursor: pointer; }
    .ref-item:hover { background: var(--accent-lt); }
    .ref-swatch { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

    .btn { width: 100%; padding: 9px; background: var(--accent); color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity .15s; margin-top: 4px; }
    .btn:hover { opacity: .88; }
    .btn:disabled { opacity: .45; cursor: default; }

    .main-area { display: flex; flex-direction: column; gap: 20px; }

    /* ── Alerta banner ── */
    .alert-banner { background: var(--alert); border: 1px solid var(--alert-border); border-radius: var(--radius); padding: 12px 16px; font-size: 12.5px; color: var(--alert-text); display: flex; align-items: flex-start; gap: 10px; }
    .alert-banner strong { font-weight: 600; }
    .alert-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .alert-list { margin-top: 4px; display: flex; flex-direction: column; gap: 2px; }

    /* ── Indicadores summary ── */
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
    .stat-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .stat-value { font-size: 20px; font-weight: 600; color: var(--text); }
    .stat-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* ── Tabla resumen ── */
    .summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 20px 16px; overflow-x: auto; }
    .section-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .section-title span { font-size: 11px; font-weight: 400; color: var(--muted); }

    .export-btn { font-size: 11px; padding: 4px 10px; border: 1px solid var(--border); border-radius: 5px; background: var(--bg); color: var(--muted); cursor: pointer; transition: all .12s; white-space: nowrap; }
    .export-btn:hover { background: var(--accent-lt); border-color: var(--accent); color: var(--accent); }

    .summary-table { border-collapse: collapse; font-size: 12px; min-width: 100%; }
    .summary-table th { background: var(--accent); color: #fff; font-weight: 600; padding: 8px 10px; text-align: center; white-space: nowrap; font-size: 11px; }
    .summary-table th.col-fecha { text-align: left; min-width: 120px; }
    .summary-table th.city-header { border-left: 2px solid rgba(255,255,255,0.25); }
    .summary-table th.sub-min { background: #1e4d7a; font-weight: 500; font-size: 10px; }
    .summary-table th.sub-max { background: #a63020; font-weight: 500; font-size: 10px; }
    .summary-table th.sub-ref { background: #4a8a9a; font-weight: 500; font-size: 10px; }
    .summary-table td { padding: 6px 10px; text-align: center; border-bottom: 1px solid var(--border); }
    .summary-table td.col-fecha { text-align: left; font-weight: 500; color: var(--text); white-space: nowrap; }
    .summary-table tr:nth-child(even) td { background: #f4f7fb; }
    .summary-table tr:last-child td { border-bottom: none; }
    .td-max { color: #b83020; font-weight: 600; }
    .td-min { color: #1e5a8a; font-weight: 600; }
    .td-ref { color: #4a8a9a; font-weight: 500; font-size: 11px; }
    .city-border { border-left: 2px solid var(--border); }

    /* Alerta en celda de tabla */
    .td-alert { background: #FFF3CD !important; color: #92400E !important; font-weight: 700; border-radius: 3px; }

    /* ── Gráficos ── */
    .charts-area { display: flex; flex-direction: column; gap: 16px; }
    .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 16px 12px; }
    .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; }
    .chart-title { font-size: 14px; font-weight: 600; color: var(--text); }
    .chart-alert-badge { font-size: 10px; background: var(--alert); color: var(--alert-text); border: 1px solid var(--alert-border); border-radius: 4px; padding: 2px 7px; font-weight: 600; }
    .chart-subtitle { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
    .chart-plot { width: 100%; height: 250px; }

    /* ── Update timestamp ── */
    .update-time { font-size: 11px; color: var(--muted); text-align: right; padding: 4px 0; }

    .empty-state { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 60px 20px; text-align: center; color: var(--muted); font-size: 14px; }
    .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: .4; }
    .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { background: #FEF2F2; border: 1px solid #FECACA; border-radius: var(--radius); padding: 14px 16px; font-size: 13px; color: #991B1B; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Clima Argentina <span>— Bandas de temperatura</span></h1>
  </div>
  <div class="header-meta" id="header-time"></div>
</header>

<div class="app">
  <aside class="panel">
    <div class="panel-section">
      <div class="panel-label">Ciudades</div>
      <div class="city-list" id="city-list"></div>
    </div>
    <div class="panel-section">
      <div class="panel-label">Período</div>
      <div class="quick-dates">
        <button class="quick-btn" onclick="setQuick(7)">7 días</button>
        <button class="quick-btn" onclick="setQuick(14)">14 días</button>
        <button class="quick-btn" onclick="setQuick(16)">16 días</button>
      </div>
      <div class="date-group">
        <div class="date-row"><label>Desde</label><input type="date" id="date-from"></div>
        <div class="date-row"><label>Hasta</label><input type="date" id="date-to"></div>
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-label">Capas</div>
      <div class="ref-group" id="layers-list"></div>
    </div>
    <button class="btn" id="btn-update" onclick="updateCharts()">Actualizar gráficos</button>
  </aside>

  <main class="main-area" id="main-area">
    <div class="empty-state">
      <div class="empty-icon">🌡</div>
      Seleccioná ciudades y hacé clic en <strong>Actualizar gráficos</strong>
    </div>
  </main>
</div>

<script>
const CIUDADES = [
  { id: "tucuman",   label: "Tucumán",   lat: -26.8241, lon: -65.2226 },
  { id: "cordoba",   label: "Córdoba",   lat: -31.4135, lon: -64.1811 },
  { id: "rosario",   label: "Rosario",   lat: -32.9442, lon: -60.6505 },
  { id: "bsas",      label: "Bs. Aires", lat: -34.6037, lon: -58.3816 },
  { id: "neuquen",   label: "Neuquén",   lat: -38.9516, lon: -68.0591 },
  { id: "bariloche", label: "Bariloche", lat: -41.1335, lon: -71.3103 },
  { id: "comodoro",  label: "Cmd. Riv",  lat: -45.8667, lon: -67.5000 },
];

const OLA_POLAR = {
  tucuman:   { min: 8,  max: 18 },
  cordoba:   { min: 7,  max: 15 },
  rosario:   { min: 8,  max: 15 },
  bsas:      { min: 8,  max: 14 },
  neuquen:   { min: -6, max: 3  },
  bariloche: { min: -4, max: 2  },
  comodoro:  { min: 3,  max: 7  },
};

const COLORES = { pronostico: "#E8622A", ola_polar: "#A8D5E8" };
const BASE_URL = "https://api.open-meteo.com/v1/forecast";
const DIAS_ES  = ["Dom.","Lun.","Mar.","Mié.","Jue.","Vie.","Sáb."];
const MESES_ES = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
const layers   = { pronostico: true, ola_polar: true };
const DEFAULT_CIUDADES = new Set(["cordoba", "rosario", "bsas"]);

function isoHoy() { return new Date().toISOString().slice(0, 10); }
function isoMas(d) { const dt = new Date(); dt.setDate(dt.getDate() + d); return dt.toISOString().slice(0, 10); }
function formatLabel(iso) {
  const d = new Date(iso + "T12:00:00");
  return `${DIAS_ES[d.getDay()]} ${d.getDate()}-${MESES_ES[d.getMonth()]}-${String(d.getFullYear()).slice(2)}`;
}
function nowStr() {
  const d = new Date();
  return `Actualizado: ${d.toLocaleDateString("es-AR")} ${d.toLocaleTimeString("es-AR", {hour:"2-digit",minute:"2-digit"})}`;
}

// ── Accesos rápidos ───────────────────────────────────────────
function setQuick(days) {
  document.getElementById("date-from").value = isoHoy();
  document.getElementById("date-to").value   = isoMas(days - 1);
}

// ── Init ──────────────────────────────────────────────────────
function initControls() {
  document.getElementById("date-from").value = isoHoy();
  document.getElementById("date-to").value   = isoMas(6);
  document.getElementById("header-time").textContent = nowStr();

  const list = document.getElementById("city-list");
  CIUDADES.forEach(c => {
    const checked = DEFAULT_CIUDADES.has(c.id);
    const item = document.createElement("label");
    item.className = "city-item" + (checked ? " active" : "");
    item.innerHTML = `<input type="checkbox" value="${c.id}" ${checked ? "checked" : ""}>${c.label}`;
    item.querySelector("input").addEventListener("change", e => item.classList.toggle("active", e.target.checked));
    list.appendChild(item);
  });

  const ll = document.getElementById("layers-list");
  [
    { key: "pronostico", label: "Banda pronóstico",   color: COLORES.pronostico },
    { key: "ola_polar",  label: "Ola Polar (jul-25)", color: COLORES.ola_polar  },
  ].forEach(l => {
    const item = document.createElement("label");
    item.className = "ref-item";
    item.innerHTML = `
      <input type="checkbox" ${layers[l.key] ? "checked" : ""} style="accent-color:${l.color};width:14px;height:14px;cursor:pointer">
      <span class="ref-swatch" style="background:${l.color}"></span>
      <span style="font-size:12px">${l.label}</span>`;
    item.querySelector("input").addEventListener("change", e => { layers[l.key] = e.target.checked; });
    ll.appendChild(item);
  });
}

// ── API ───────────────────────────────────────────────────────
async function fetchForecast(lat, lon, start, end) {
  const p = new URLSearchParams({ latitude: lat, longitude: lon,
    daily: "temperature_2m_max,temperature_2m_min",
    timezone: "America/Argentina/Buenos_Aires", start_date: start, end_date: end });
  const res = await fetch(`${BASE_URL}?${p}`);
  if (!res.ok) throw new Error(`API error ${res.status}`);
  return (await res.json()).daily;
}

// ── Detección de alertas ──────────────────────────────────────
function getAlerts(ciudad, daily) {
  const ola = OLA_POLAR[ciudad.id];
  if (!ola) return [];
  const alerts = [];
  daily.time.forEach((iso, i) => {
    const mn = daily.temperature_2m_min[i];
    const mx = daily.temperature_2m_max[i];
    if (mn < ola.min || mx < ola.min) {
      alerts.push({ fecha: formatLabel(iso), tipo: "frío extremo", mn: Math.round(mn), mx: Math.round(mx), refMin: ola.min });
    }
  });
  return alerts;
}

// ── Banner de alertas globales ────────────────────────────────
function buildAlertBanner(results) {
  const allAlerts = [];
  results.forEach(({ ciudad, daily }) => {
    const alerts = getAlerts(ciudad, daily);
    alerts.forEach(a => allAlerts.push({ ciudad: ciudad.label, ...a }));
  });
  if (allAlerts.length === 0) return "";
  const items = allAlerts.map(a =>
    `<div>⚠ <strong>${a.ciudad}</strong> — ${a.fecha}: Mín ${a.mn}° / Máx ${a.mx}° (por debajo de referencia ${a.refMin}°)</div>`
  ).join("");
  return `<div class="alert-banner">
    <div class="alert-icon">🌨</div>
    <div><strong>Temperaturas bajo referencia Ola Polar</strong><div class="alert-list">${items}</div></div>
  </div>`;
}

// ── Tabla resumen ─────────────────────────────────────────────
function buildSummaryTable(results) {
  const fechas = results[0].daily.time;
  const showOla = layers.ola_polar;

  const cityHeaders = results.map(({ ciudad }) =>
    `<th class="city-header" colspan="${showOla && OLA_POLAR[ciudad.id] ? 4 : 2}">${ciudad.label}</th>`
  ).join("");

  const subHeaders = results.map(({ ciudad }) => {
    const ola = showOla && OLA_POLAR[ciudad.id];
    return `<th class="sub-min city-border">Min</th><th class="sub-max">Max</th>` +
      (ola ? `<th class="sub-ref">Min ref</th><th class="sub-ref">Max ref</th>` : "");
  }).join("");

  const rows = fechas.map((iso, i) => {
    const cells = results.map(({ ciudad, daily }) => {
      const mn  = Math.round(daily.temperature_2m_min[i]);
      const mx  = Math.round(daily.temperature_2m_max[i]);
      const ola = showOla && OLA_POLAR[ciudad.id];
      const alertMn = ola && mn < ola.min;
      const alertMx = ola && mx < ola.min;
      return `<td class="td-min city-border${alertMn ? " td-alert" : ""}">${mn}°</td>` +
             `<td class="td-max${alertMx ? " td-alert" : ""}">${mx}°</td>` +
             (ola ? `<td class="td-ref">${ola.min}°</td><td class="td-ref">${ola.max}°</td>` : "");
    }).join("");
    return `<tr><td class="col-fecha">${formatLabel(iso)}</td>${cells}</tr>`;
  }).join("");

  return `
    <div class="summary-card">
      <div class="section-title">
        Tabla de temperaturas <span>Min / Max por ciudad</span>
        <button class="export-btn" onclick="exportCSV()">⬇ Exportar CSV</button>
      </div>
      <table class="summary-table" id="summary-table">
        <thead>
          <tr><th class="col-fecha">Fecha</th>${cityHeaders}</tr>
          <tr><th></th>${subHeaders}</tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

// ── Export CSV ────────────────────────────────────────────────
let _lastResults = [];
function exportCSV() {
  if (!_lastResults.length) return;
  const fechas = _lastResults[0].daily.time;
  const headers = ["Fecha", ..._lastResults.flatMap(({ ciudad }) => [`${ciudad.label} Min`, `${ciudad.label} Max`])];
  const rows = fechas.map((iso, i) => [
    formatLabel(iso),
    ..._lastResults.flatMap(({ daily }) => [
      Math.round(daily.temperature_2m_min[i]),
      Math.round(daily.temperature_2m_max[i])
    ])
  ]);
  const csv = [headers, ...rows].map(r => r.join(",")).join("\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `clima_argentina_${isoHoy()}.csv`;
  a.click();
}

// ── Gráfico individual ────────────────────────────────────────
function buildChart(ciudad, daily) {
  const labels = daily.time.map(formatLabel);
  const tmin   = daily.temperature_2m_min;
  const tmax   = daily.temperature_2m_max;
  const traces = [];

  traces.push({
    x: labels, y: tmax.map(v => Math.round(v)), mode: "lines",
    line: { color: COLORES.pronostico, width: 1.5, dash: "dot" },
    name: "Máx", hovertemplate: "<b>Máx: %{y}°C</b><extra></extra>",
  });
  traces.push({
    x: labels, y: tmin.map(v => Math.round(v)), mode: "lines",
    line: { color: "#2E5F8A", width: 1.5, dash: "dot" },
    name: "Mín", hovertemplate: "<b>Mín: %{y}°C</b><extra></extra>",
  });

  if (layers.pronostico) {
    traces.push({
      x: [...labels, ...labels.slice().reverse()],
      y: [...tmax, ...tmin.slice().reverse()],
      fill: "toself", fillcolor: COLORES.pronostico + "CC",
      line: { color: "transparent" }, name: "Banda pronóstico",
      hoverinfo: "skip", type: "scatter", mode: "none",
    });
  }

  const ola = OLA_POLAR[ciudad.id];
  if (layers.ola_polar && ola) {
    const n = labels.length;
    traces.push({
      x: [...labels, ...labels.slice().reverse()],
      y: [...Array(n).fill(ola.max), ...Array(n).fill(ola.min)],
      fill: "toself", fillcolor: COLORES.ola_polar + "BB",
      line: { color: "transparent" }, name: "Ola Polar (jul-25)",
      hoverinfo: "skip", type: "scatter", mode: "none",
    });
  }

  const layout = {
    margin: { t: 10, r: 20, b: 65, l: 42 },
    paper_bgcolor: "rgba(0,0,0,0)", plot_bgcolor: "rgba(0,0,0,0)",
    showlegend: true,
    legend: { orientation: "h", y: -0.32, x: 0, font: { size: 11 }, bgcolor: "rgba(0,0,0,0)" },
    xaxis: { tickfont: { size: 10.5, color: "#6b7280" }, showgrid: false, zeroline: false, linecolor: "#e2e6ea" },
    yaxis: {
      title: { text: "°C", font: { size: 11, color: "#6b7280" }, standoff: 6 },
      tickfont: { size: 10.5, color: "#6b7280" }, gridcolor: "#f0f2f5",
      zeroline: true, zerolinecolor: "#d1d5db", zerolinewidth: 1, linecolor: "#e2e6ea",
    },
    hovermode: "x unified",
    hoverlabel: { bgcolor: "#fff", bordercolor: "#e2e6ea", font: { size: 12, color: "#1a1f2e" } },
  };

  return { traces, layout, config: { displayModeBar: false, responsive: true } };
}

// ── Update ────────────────────────────────────────────────────
async function updateCharts() {
  const btn  = document.getElementById("btn-update");
  const area = document.getElementById("main-area");

  const selected = [...document.querySelectorAll("#city-list input:checked")]
    .map(el => CIUDADES.find(c => c.id === el.value)).filter(Boolean);

  if (selected.length === 0) {
    area.innerHTML = `<div class="empty-state"><div class="empty-icon">📍</div>Seleccioná al menos una ciudad.</div>`;
    return;
  }

  const startDate = document.getElementById("date-from").value;
  const endDate   = document.getElementById("date-to").value;
  if (!startDate || !endDate || startDate > endDate) {
    area.innerHTML = `<div class="error-msg">Revisá el rango de fechas.</div>`;
    return;
  }

  btn.disabled = true;
  area.innerHTML = `<div class="empty-state"><div class="spinner"></div>Consultando pronósticos...</div>`;

  try {
    const results = await Promise.all(
      selected.map(c => fetchForecast(c.lat, c.lon, startDate, endDate).then(d => ({ ciudad: c, daily: d })))
    );
    _lastResults = results;

    area.innerHTML = "";

    // Timestamp
    document.getElementById("header-time").textContent = nowStr();

    // Alertas globales
    const alertHtml = buildAlertBanner(results);
    if (alertHtml) area.insertAdjacentHTML("beforeend", alertHtml);

    // Tabla resumen
    area.insertAdjacentHTML("beforeend", buildSummaryTable(results));

    // Gráficos
    const chartsWrap = document.createElement("div");
    chartsWrap.className = "charts-area";
    area.appendChild(chartsWrap);

    results.forEach(({ ciudad, daily }) => {
      const alerts = getAlerts(ciudad, daily);
      const dateRange = `${formatLabel(daily.time[0])} → ${formatLabel(daily.time[daily.time.length - 1])}`;
      const card = document.createElement("div");
      card.className = "chart-card";
      card.innerHTML = `
        <div class="chart-header">
          <div class="chart-title">${ciudad.label}</div>
          ${alerts.length ? `<div class="chart-alert-badge">⚠ ${alerts.length} día${alerts.length > 1 ? "s" : ""} bajo referencia</div>` : ""}
        </div>
        <div class="chart-subtitle">${dateRange}</div>
        <div class="chart-plot" id="chart-${ciudad.id}"></div>`;
      chartsWrap.appendChild(card);
      const { traces, layout, config } = buildChart(ciudad, daily);
      Plotly.newPlot(`chart-${ciudad.id}`, traces, layout, config);
    });

  } catch (err) {
    area.innerHTML = `<div class="error-msg">Error al obtener datos: ${err.message}</div>`;
  } finally {
    btn.disabled = false;
  }
}

initControls();
</script>
</body>
</html>
